services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracker-bpkp-app
    container_name: tracker-bpkp-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    networks:
      - tracker-network
    env_file:
      - .env
    depends_on:
      - db

  # Nginx Web Server
  # Web server is run inside the `app` container (nginx + php-fpm)
  # Expose HTTP port from the app service instead of running a separate nginx container

  # Database
  db:
    image: postgres:15-alpine
    container_name: tracker-bpkp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tracker_bpkp}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - tracker-network

networks:
  tracker-network:
    driver: bridge

volumes:
  db-data:
    driver: local
